customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
rules:
  - source: '/api/<*>'
    target: 'http://lnuais-backend-env.eba-4mp5tntm.eu-north-1.elasticbeanstalk.com/api/<*>'
    status: '200'
  - source: '/users/<*>'
    target: 'http://lnuais-backend-env.eba-4mp5tntm.eu-north-1.elasticbeanstalk.com/users/<*>'
    status: '200'
  - source: '/oauth2/<*>'
    target: 'http://lnuais-backend-env.eba-4mp5tntm.eu-north-1.elasticbeanstalk.com/oauth2/<*>'
    status: '200'
  - source: '/logout'
    target: 'http://lnuais-backend-env.eba-4mp5tntm.eu-north-1.elasticbeanstalk.com/logout'
    status: '200'
  - source: '<*>'
    target: '/index.html'
    status: '404-200'

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <link rel="icon" type="image/x-icon" href="/images/logo.png" />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

    /* --- Dashboard Specific Styles --- */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .profile-pic {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #eee;
    }

    .profile-info h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .profile-info p {
      margin: 5px 0 0;
      color: #666;
    }

    .info-grid {
      display: grid;
      gap: 15px;
      text-align: left;
    }

    .info-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 6px;
    }

    .info-item label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 5px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .info-value {
      font-size: 1.1rem;
      color: #333;
      font-weight: 500;
    }

    /* Edit Inputs */
    .edit-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .action-buttons {
      margin-top: 30px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* FIX: Added !important to ensure this overrides the flex display */
    .hidden {
      display: none !important;
    }

    /* Notification Box */
    .alert-box {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-weight: bold;
      display: none;
    }

    .alert-warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    /* Delete Section */
    .delete-section {
      margin-top: 40px;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .delete-btn {
      background-color: #fff;
      color: #dc3545;
      border: 1px solid #dc3545;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .delete-btn:hover {
      background-color: #dc3545;
      color: #fff;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 400px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .modal-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
  </style>

  <title>Dashboard - LNU AI Society</title>
</head>

<body>
  <nav class="navbar">
    <a href="/"><img src="/images/logo.png" alt="Logo" class="logo" /></a>

    <button class="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="menu">
      <li class="item"><a href="events.html">Events</a></li>
      <li class="item"><a href="courses.html">Courses</a></li>
      <li class="item"><a href="news.html">News</a></li>
      <li class="item"><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="container">
    <div id="loading" style="text-align: center; margin-top: 100px">
      <h2>Loading Profile...</h2>
    </div>

    <div id="dashboardContent" style="display: none">
      <div class="hero">
        <h1>Student Dashboard</h1>
        <p>Manage your membership and profile details.</p>
      </div>

      <div class="card">
        <div id="notification" class="alert-box"></div>

        <div class="profile-header">
          <img id="profilePic" src="" alt="Profile" class="profile-pic" />
          <div class="profile-info">
            <h2 id="userName">Loading...</h2>
            <p id="userEmail">loading...</p>
          </div>
        </div>

        <div id="viewMode" class="info-grid">
          <div class="info-item">
            <label>Programme</label>
            <div class="info-value" id="displayProgram">N/A</div>
          </div>
          <div class="info-item">
            <label>Experience Level</label>
            <div class="info-value" id="displayLevel">N/A</div>
          </div>
        </div>

        <div id="editMode" class="info-grid hidden">
          <div class="info-item">
            <label for="editProgram">Programme</label>
            <input type="text" id="editProgram" class="edit-input" placeholder="e.g. Computer Science" />
          </div>
          <div class="info-item">
            <label for="editLevel">Experience Level</label>
            <select id="editLevel" class="edit-input">
              <option value="LOW">Beginner</option>
              <option value="MID">Intermediate</option>
              <option value="HIGH">Advanced</option>
            </select>
          </div>
        </div>

        <div class="action-buttons">
          <button id="editBtn" class="primary" onclick="toggleEditMode()">
            Edit Profile
          </button>
          <button id="saveBtn" class="primary hidden" onclick="saveProfile()">
            Save Changes
          </button>
          <button id="cancelBtn" class="secondary hidden" onclick="toggleEditMode()">
            Cancel
          </button>

          <button onclick="handleLogout()" class="secondary" style="
                margin-left: auto;
                background-color: #fee2e2;
                color: #c53030;
                border: none;
              ">
            Log Out
          </button>
        </div>

        <div class="delete-section">
          <button onclick="showDeleteModal()" class="delete-btn">
            Delete Account
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="hidden modal-overlay">
    <div class="modal-content">
      <h3 style="color: #dc3545">Delete Account?</h3>
      <p>This action cannot be undone.</p>

      <div id="passwordConfirm" style="margin: 15px 0">
        <input type="password" id="deletePassword" class="edit-input" placeholder="Enter password to confirm" />
      </div>

      <div class="modal-actions">
        <button onclick="closeDeleteModal()" class="secondary">Cancel</button>
        <button onclick="confirmDelete()" class="primary" style="background-color: #dc3545">
          Delete Forever
        </button>
      </div>
    </div>
  </div>

  <footer>
    <h3>LNU AI Society</h3>
    <div class="footer-items">
      <p>
        <a href="https://www.linkedin.com/company/lnuais/" target="_blank">
          <img src="images/linkedin.svg" alt="" class="footer-icon" />
        </a>
        <a href="https://www.instagram.com/lnuaisociety" target="_blank">
          <img src="images/instagram.svg" alt="" class="footer-icon" />
        </a>
        © 2025 LNU AI Society.<br />All rights reserved. <br />
        802552-2056
      </p>
    </div>
  </footer>

  <script>
    const DEFAULT_AVATAR_URL =
      "https://ui-avatars.com/api/?background=random&name=";
    let currentUser = null;
    let isGoogleUser = false; // Flag to control delete modal

    async function checkSession() {
      // 1. Check LocalStorage first
      const storedUser = localStorage.getItem("user");
      if (storedUser) {
        initDashboard(JSON.parse(storedUser));
        return;
      }

      // 2. Check Backend Cookie (Google Login)
      try {
        const response = await fetch(`${CONFIG.API_BASE_URL}/users/profile`, {
          method: "GET",
          credentials: "include",
        });

        if (response.ok) {
          const googleData = await response.json();

          const user = {
            id: googleData.id,
            name: googleData.name,
            email: googleData.email,
            picture: googleData.picture,
            program: googleData.program || "N/A",
            level: googleData.level || "N/A",
          };
          // If program is "N/A (Google Login)" it's definitely Google
          if (user.program === "N/A (Google Login)") {
            user.isGoogle = true;
          }

          initDashboard(user);
        } else {
          window.location.href = "signin.html";
        }
      } catch (error) {
        window.location.href = "signin.html";
      }
    }

    function initDashboard(user) {
      currentUser = user;
      // Determine if manual or google based on picture URL or explicit flag
      // A robust way is checking if the password field in DB is null, but frontend can guess:
      // If program was "N/A (Google Login)" or we came from profile endpoint, treat as Google.
      isGoogleUser =
        user.isGoogle ||
        (user.picture && user.picture.includes("googleusercontent"));

      document.getElementById("loading").style.display = "none";
      document.getElementById("dashboardContent").style.display = "block";

      // Fill Data
      document.getElementById("userName").textContent = user.name;
      document.getElementById("userEmail").textContent = user.email;
      document.getElementById("displayProgram").textContent =
        user.program || "N/A";
      document.getElementById("displayLevel").textContent =
        user.level || "N/A";

      if (user.picture) {
        document.getElementById("profilePic").src = user.picture;
      } else {
        document.getElementById("profilePic").src =
          DEFAULT_AVATAR_URL + user.name;
      }

      // Force Update if info missing
      if (
        !user.program ||
        user.program === "N/A" ||
        user.program === "N/A (Google Login)"
      ) {
        showNotification(
          "Please complete your profile details.",
          "alert-warning",
        );
        toggleEditMode();
      }
    }

    function toggleEditMode() {
      const viewMode = document.getElementById("viewMode");
      const editMode = document.getElementById("editMode");
      const editBtn = document.getElementById("editBtn");
      const saveBtn = document.getElementById("saveBtn");
      const cancelBtn = document.getElementById("cancelBtn");

      if (editMode.classList.contains("hidden")) {
        // Show Edit
        viewMode.classList.add("hidden");
        editMode.classList.remove("hidden");
        editBtn.classList.add("hidden");
        saveBtn.classList.remove("hidden");
        cancelBtn.classList.remove("hidden");

        // Fill inputs
        const currentProg =
          document.getElementById("displayProgram").textContent;
        document.getElementById("editProgram").value =
          currentProg === "N/A" || currentProg === "N/A (Google Login)"
            ? ""
            : currentProg;

        const currentLvl =
          document.getElementById("displayLevel").textContent;
        document.getElementById("editLevel").value =
          currentLvl === "N/A" ? "LOW" : currentLvl;
      } else {
        // Show View
        editMode.classList.add("hidden");
        viewMode.classList.remove("hidden");
        saveBtn.classList.add("hidden");
        cancelBtn.classList.add("hidden");
        editBtn.classList.remove("hidden");
        document.getElementById("notification").style.display = "none";
      }
    }

    async function saveProfile() {
      const newProgram = document.getElementById("editProgram").value;
      const newLevel = document.getElementById("editLevel").value;
      const saveBtn = document.getElementById("saveBtn");

      saveBtn.textContent = "Saving...";
      saveBtn.disabled = true;

      try {
        const response = await fetch(
          `${CONFIG.API_BASE_URL}/users/${currentUser.id}/update_profile`,
          {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ program: newProgram, level: newLevel }),
            credentials: "include",
          },
        );

        if (response.ok) {
          const updatedUser = await response.json();

          // Update state
          currentUser = updatedUser;
          localStorage.setItem("user", JSON.stringify(updatedUser));

          // Update UI
          document.getElementById("displayProgram").textContent =
            updatedUser.program;
          document.getElementById("displayLevel").textContent =
            updatedUser.level;

          showNotification("Profile updated successfully!", "alert-success");
          toggleEditMode();
        } else {
          throw new Error("Failed to update");
        }
      } catch (error) {
        showNotification("Error updating profile.", "alert-warning");
      } finally {
        saveBtn.textContent = "Save Changes";
        saveBtn.disabled = false;
      }
    }

    // --- DELETE LOGIC ---
    function showDeleteModal() {
      const modal = document.getElementById("deleteModal");
      const passField = document.getElementById("passwordConfirm");

      // Hide password field for Google Users
      if (isGoogleUser) {
        passField.style.display = "none";
      } else {
        passField.style.display = "block";
      }
      modal.classList.remove("hidden");
    }

    function closeDeleteModal() {
      document.getElementById("deleteModal").classList.add("hidden");
    }

    async function confirmDelete() {
      const password = document.getElementById("deletePassword").value;

      if (!isGoogleUser && !password) {
        alert("Please enter your password to confirm.");
        return;
      }

      try {
        // Use standard DELETE endpoint
        const response = await fetch(
          `${CONFIG.API_BASE_URL}/users/${currentUser.id}`,
          {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: password }),
            credentials: "include",
          },
        );

        if (response.ok) {
          alert("Account deleted.");
          handleLogout();
        } else {
          const err = await response.json();
          alert("Error: " + (err.message || "Could not delete account"));
        }
      } catch (e) {
        console.error(e);
        alert("Error connecting to server.");
      }
    }

    function showNotification(msg, type) {
      const notif = document.getElementById("notification");
      notif.textContent = msg;
      notif.className = `alert-box ${type}`;
      notif.style.display = "block";
    }

    async function handleLogout() {
      // 1. Clear Local Storage (Crucial for removing the avatar)
      localStorage.removeItem('user');

      // 2. Clear Backend Session (Google Login)
      try {
        // We send a request to the backend to kill the cookie.
        // We use 'await' so we don't redirect until the server knows we are gone.
        await fetch(`${CONFIG.API_BASE_URL}/logout`, {
          method: 'GET',
          credentials: 'include'
        });
      } catch (error) {
        console.error("Logout error:", error);
        // Even if the network call fails, we still want to clear the frontend
      }

      // 3. Redirect to Frontend Home Page
      window.location.href = "index.html";
    }

    checkSession();
  </script>
  <script src="scripts/config.js"></script>
  <script src="scripts/navbar.js"></script>
  <script src="scripts/hamburger.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/events.css" />
    <link rel="icon" type="image/x-icon" href="/images/logo.png" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
      
      /* Modal Styles */
      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; display: none; }
      .modal-content { background: white; padding: 30px; border-radius: 8px; width: 350px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
      .modal-btn { margin-top: 15px; display: inline-block; width: 100%; padding: 10px; border-radius: 5px; text-decoration: none; }
      
      /* Registered State Button */
      .event-button.registered {
          background-color: #dc3545; /* Red */
          color: white;
      }
      .event-button.registered:hover {
          background-color: #c82333;
      }
    </style>
    <title>Events - LNU AI Society</title>
  </head>
  <body>
    <nav class="navbar">
      <a href="/"><img src="/images/logo.png" alt="Logo" class="logo" /></a>
      <ul class="menu">
        <li class="item"><a href="events.html">Events</a></li>
        <li class="item"><a href="courses.html">Courses</a></li>
        <li class="item"><a href="news.html">News</a></li>
        <li class="item"><a href="about.html">About</a></li>
        <li class="item"><a href="signup.html">Join Us</a></li>
      </ul>
    </nav>
    
    <div class="container">
      <div class="about-hero">
        <h1>Upcoming Events</h1>
        <p>Join us for workshops, hackathons, and networking events throughout the year.</p>
      </div>
      
      <div class="events-grid" id="eventsContainer">
          <p style="text-align:center; grid-column: 1/-1;">Loading events...</p>
      </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Join Us First!</h3>
            <p>You need to be a member to register for events.</p>
            <a href="signup.html" class="primary modal-btn" style="background-color: #2563eb; color: white;">Create Account</a>
            <a href="signin.html" class="secondary modal-btn" style="background-color: #f3f4f6; color: #333; display:block; margin-top:10px;">Sign In</a>
            <button onclick="closeModal()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; text-decoration:underline;">Close</button>
        </div>
    </div>

    <footer>
      <h3>LNU AI Society</h3>
      <div class="footer-items"><p>© 2025 LNU AI Society</p></div>
    </footer>
    
    <script src="scripts/navbar.js"></script>
    <script>
        // 1. Check Login Status
        const storedUser = localStorage.getItem('user');
        const currentUser = storedUser ? JSON.parse(storedUser) : null;

        async function loadEvents() {
            const container = document.getElementById('eventsContainer');
            
            try {
                // Fetch all events
                const response = await fetch('http://localhost:8080/events');
                if (!response.ok) throw new Error("Failed to load events");
                
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>No upcoming events scheduled.</p>";
                    return;
                }

                container.innerHTML = ""; // Clear loading text

                // Render Cards
                for (const event of events) {
                    const date = new Date(event.startTime);
                    const day = date.getDate();
                    const month = date.toLocaleString('default', { month: 'short' });
                    
                    // Format Time (HH:MM)
                    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    // Check if THIS user is already registered
                    let isRegistered = false;
                    if (currentUser && currentUser.id) {
                        // Note: Backend needs to return ID for this to work perfectly
                        // Or we can check the event.attendees list if backend sends it (careful of privacy)
                        // Better: Call specific endpoint to check status
                        isRegistered = await checkRegistrationStatus(event.id, currentUser.id);
                    }

                    const btnText = isRegistered ? "Unregister" : "Register";
                    const btnClass = isRegistered ? "event-button registered" : "event-button";

                    const card = `
                        <div class="event-card">
                          <div class="event-date">
                            <span class="date-day">${day}</span>
                            <span class="date-month">${month}</span>
                          </div>
                          <div class="event-content">
                            <h3>${event.title}</h3>
                            <p class="event-time">
                              <img src="images/map-pin-yellow.svg" class="event-icon" /> ${event.location} • 
                              <img src="images/clock-yellow.svg" class="event-icon" /> ${timeStr}
                            </p>
                            <p class="event-description">${event.description}</p>
                          </div>
                          <button id="btn-${event.id}" class="${btnClass}" onclick="handleEventClick(${event.id})">${btnText}</button>
                        </div>
                    `;
                    container.innerHTML += card;
                }

            } catch (error) {
                container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Could not load events.</p>";
            }
        }

        async function checkRegistrationStatus(eventId, userId) {
            try {
                const res = await fetch(`http://localhost:8080/events/${eventId}/is_registered/${userId}`);
                return await res.json();
            } catch { return false; }
        }

        async function handleEventClick(eventId) {
            if (!currentUser) {
                // Show Modal
                document.getElementById('loginModal').style.display = 'flex';
                return;
            }

            const btn = document.getElementById(`btn-${eventId}`);
            const isRegistered = btn.classList.contains('registered');
            
            // Optimistic UI update (Change button immediately to feel fast)
            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                let url, method;
                if (isRegistered) {
                    // Unregister
                    url = `http://localhost:8080/events/${eventId}/unregister/${currentUser.id}`;
                    method = 'DELETE';
                } else {
                    // Register
                    url = `http://localhost:8080/events/${eventId}/register/${currentUser.id}`;
                    method = 'POST';
                }

                const response = await fetch(url, { method: method });
                
                if (response.ok) {
                    // Toggle State
                    if (isRegistered) {
                        btn.classList.remove('registered');
                        btn.textContent = "Register";
                    } else {
                        btn.classList.add('registered');
                        btn.textContent = "Unregister";
                    }
                } else {
                    alert("Action failed. Please try again.");
                }
            } catch (e) {
                alert("Server error.");
            } finally {
                btn.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        // Initialize
        loadEvents();
    </script>
  </body>
</html>
